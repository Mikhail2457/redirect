<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-itunes-app" content="app-id=883141609">
    <title>Travelata - Переход</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 400px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div>Перенаправление в App Store...</div>
    </div>
    <script>
        // Проверяем iOS
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        
        if (isIOS) {
            // ВАЖНО: itms-apps:// блокируется в Safari iOS 18+
            // Единственный надежный способ - HTTPS редирект
            // Smart App Banner сверху предложит открыть приложение если оно установлено
            
            // Сразу редиректим на HTTPS версию App Store
            // Если приложение установлено - Smart App Banner откроет его
            // Если нет - пользователь попадет в App Store
            window.location.href = 'https://apps.apple.com/ru/app/id883141609';
        } else {
            // Для не-iOS просто показываем сообщение
            document.body.innerHTML = '<div class="container"><div>Это приложение доступно только для iOS</div></div>';
        }
    </script>
</body>
</html>
